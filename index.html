<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новий допис</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Стилі для світлої теми (за замовчуванням) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #222222;
            line-height: 1.58;
            padding: 20px 20px 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        main {
            width: 100%;
            max-width: 720px;
            margin-top: 40px; 
        }

        .title-input {
            width: 100%;
            font-size: 42px;
            font-weight: 700;
            border: none;
            outline: none;
            margin-bottom: 20px;
            color: #222222;
            background: transparent;
        }

        .title-input::placeholder {
            color: #e8e8e8;
        }

        .editor {
            width: 100%;
            min-height: 400px;
            font-size: 18px;
            border: none;
            outline: none;
            color: #333333;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-bottom: 150px;
            background: transparent;
        }

        .editor:empty:before {
            content: attr(data-placeholder);
            color: #a0a0a0;
            cursor: text;
        }

        /* Стильний непомітний лічильник зліва внизу */
        .counter {
            position: fixed;
            bottom: 40px;
            left: 40px;
            font-size: 12px;
            color: #b0b0b0;
            font-weight: 400;
            user-select: none;
            pointer-events: none;
            letter-spacing: 0.3px;
            transition: color 0.3s ease;
        }

        /* Елементи керування справа внизу */
        .bottom-controls {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }

        .status-message {
            font-size: 13px;
            color: #888888;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            user-select: none;
        }

        .status-message.show {
            opacity: 1;
        }

        .publish-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: #222222;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .publish-btn:hover {
            transform: translateX(4px);
            color: #000000;
        }

        .publish-btn:disabled {
            color: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        /* АВТОМАТИЧНА ТЕМНА ТЕМА (стиль Notion Dark) */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #191919;
                color: #ebebeb;
            }

            .title-input {
                color: #ebebeb;
            }

            .title-input::placeholder {
                color: #373737;
            }

            .editor {
                color: #e3e3e3;
            }

            .editor:empty:before {
                color: #555555;
            }

            .counter {
                color: #555555;
            }

            .publish-btn {
                color: #a0a0a0;
            }

            .publish-btn:hover {
                color: #ebebeb;
            }

            .status-message {
                color: #777777;
            }
        }
    </style>
</head>
<body>

    <main>
        <input type="text" id="post-title" class="title-input" placeholder="Заголовок" autofocus>
        <div id="post-body" class="editor" contenteditable="true" data-placeholder="Почніть писати свою історію тут..."></div>
    </main>

    <!-- Лічильник зліва -->
    <div id="counter" class="counter">0 слів</div>

    <!-- Кнопка відправки справа -->
    <div class="bottom-controls" id="controls-area">
        <span id="status" class="status-message">Надсилання...</span>
        <button id="publish-btn" class="publish-btn" onclick="publishPost()" aria-label="Опублікувати">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </div>

    <script>
        const titleInput = document.getElementById('post-title');
        const bodyDiv = document.getElementById('post-body');
        const publishBtn = document.getElementById('publish-btn');
        const statusText = document.getElementById('status');
        const counterText = document.getElementById('counter');

        // === LOCALSTORAGE & СТАРТ ===
        document.addEventListener('DOMContentLoaded', () => {
            const savedTitle = localStorage.getItem('draft_title');
            const savedBody = localStorage.getItem('draft_body');

            if (savedTitle) titleInput.value = savedTitle;
            if (savedBody) bodyDiv.innerHTML = savedBody;

            updateCounter();
        });

        titleInput.addEventListener('input', () => {
            localStorage.setItem('draft_title', titleInput.value);
        });

        bodyDiv.addEventListener('input', () => {
            localStorage.setItem('draft_body', bodyDiv.innerHTML);
            updateCounter();
        });

        function clearDraft() {
            localStorage.removeItem('draft_title');
            localStorage.removeItem('draft_body');
            titleInput.value = '';
            bodyDiv.innerHTML = '';
            updateCounter();
        }

        // === ЛІЧИЛЬНИК СЛІВ ТА ЧАСУ ЧИТАННЯ ===
        function updateCounter() {
            const text = bodyDiv.innerText.trim();
            const words = text ? text.split(/\s+/).length : 0;
            const readingTime = Math.max(1, Math.ceil(words / 180)); // ~180 слів/хв

            if (words === 0) {
                counterText.innerText = '0 слів';
                return;
            }

            // Правильне відмінювання українською мовою
            let wordString = 'слів';
            const lastDigit = words % 10;
            const lastTwoDigits = words % 100;

            if (lastDigit === 1 && lastTwoDigits !== 11) {
                wordString = 'слово';
            } else if (lastDigit >= 2 && lastDigit <= 4 && (lastTwoDigits < 10 || lastTwoDigits >= 20)) {
                wordString = 'слова';
            }

            counterText.innerText = `${words} ${wordString} · ~${readingTime} хв читання`;
        }

        // === ГАРЯЧІ КЛАВІШІ ДЛЯ ФОРМАТУВАННЯ ===
        bodyDiv.addEventListener('keydown', (e) => {
            const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
            const modifier = isMac ? e.metaKey : e.ctrlKey;

            if (modifier && e.key.toLowerCase() === 'b') {
                e.preventDefault();
                document.execCommand('bold', false, null);
            }
            if (modifier && e.key.toLowerCase() === 'i') {
                e.preventDefault();
                document.execCommand('italic', false, null);
            }
        });

        // === КОНВЕРТАЦІЯ ДЛЯ TELEGRAM HTML ===
        // Функція перетворює HTML-код редактора на чисту розмітку, яку розуміє Telegram
        function convertToTelegramHTML(title, bodyHTML) {
            const temp = document.createElement('div');
            temp.innerHTML = bodyHTML;

            function serialize(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return node.nodeValue
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                }
                if (node.nodeType !== Node.ELEMENT_NODE) {
                    return '';
                }

                const tagName = node.tagName.toLowerCase();
                const childrenHtml = Array.from(node.childNodes).map(serialize).join('');

                if (tagName === 'b' || tagName === 'strong') {
                    return `<b>${childrenHtml}</b>`;
                }
                if (tagName === 'i' || tagName === 'em') {
                    return `<i>${childrenHtml}</i>`;
                }
                if (tagName === 'br') {
                    return '\n';
                }
                if (tagName === 'div' || tagName === 'p') {
                    return `\n${childrenHtml}`;
                }
                return childrenHtml;
            }

            let bodyFormatted = Array.from(temp.childNodes).map(serialize).join('');
            bodyFormatted = bodyFormatted.replace(/\n{3,}/g, '\n\n').trim();

            const escapeHTML = (str) => str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            let finalMessage = '';
            if (title.trim()) {
                finalMessage += `<b>${escapeHTML(title.trim())}</b>\n\n`;
            }
            finalMessage += bodyFormatted;

            return finalMessage.trim();
        }

        // === ПУБЛІКАЦІЯ ===
        async function publishPost() {
            const title = titleInput.value.trim();
            const bodyHTML = bodyDiv.innerHTML;

            // Перевіряємо, чи є хоч якийсь текст
            if (!title && !bodyDiv.innerText.trim()) return;

            publishBtn.disabled = true;
            statusText.innerText = 'Надсилання...';
            statusText.classList.add('show');

            // Створюємо правильний HTML для Telegram на клієнті
            const formattedText = convertToTelegramHTML(title, bodyHTML);

            try {
                const response = await fetch('/api/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ formattedText })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    statusText.innerText = 'Опубліковано';
                    clearDraft();
                    
                    setTimeout(() => {
                        statusText.classList.remove('show');
                    }, 3000);
                } else {
                    throw new Error(data.error || 'Помилка надсилання');
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = 'Помилка';
                alert('Не вдалося опублікувати: ' + error.message);
                setTimeout(() => {
                    statusText.classList.remove('show');
                }, 4000);
            } finally {
                publishBtn.disabled = false;
            }
        }

        // Повноекранний режим
        document.addEventListener('dblclick', function(event) {
            const controls = document.getElementById('controls-area');
            const isClickInsideInput = titleInput.contains(event.target) || event.target === titleInput;
            const isClickInsideBody = bodyDiv.contains(event.target) || event.target === bodyDiv;
            const isClickInsideControls = controls.contains(event.target) || event.target === controls;

            if (!isClickInsideInput && !isClickInsideBody && !isClickInsideControls) {
                toggleFullscreen();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn(`Повноекранний режим недоступний: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
