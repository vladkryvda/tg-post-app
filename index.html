<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#191919" media="(prefers-color-scheme: dark)">
    <title>Новий допис</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body, :fullscreen, ::backdrop {
            background-color: #ffffff;
            color: #222222;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.58;
            padding: max(20px, env(safe-area-inset-top)) 20px 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        main {
            width: 100%;
            max-width: 720px;
            margin-top: 40px; 
        }

        .title-input {
            width: 100%;
            font-size: 42px;
            font-weight: 700;
            border: none;
            outline: none;
            margin-bottom: 20px;
            color: #222222;
            background: transparent;
        }

        .title-input::placeholder {
            color: #e8e8e8;
        }

        .editor {
            width: 100%;
            min-height: 400px;
            font-size: 18px;
            border: none;
            outline: none;
            color: #333333;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-bottom: 150px;
            background: transparent;
        }

        .editor:empty:before {
            content: attr(data-placeholder);
            color: #a0a0a0;
            cursor: text;
        }

        .counter {
            position: fixed;
            bottom: 40px;
            left: 40px;
            font-size: 12px;
            color: #b0b0b0;
            font-weight: 400;
            user-select: none;
            pointer-events: none;
            letter-spacing: 0.3px;
            transition: color 0.3s ease;
        }

        .bottom-controls {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }

        .status-message {
            font-size: 13px;
            color: #888888;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            user-select: none;
        }

        .status-message.show {
            opacity: 1;
        }

        .publish-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: #222222;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .publish-btn:hover {
            transform: translateX(4px);
            color: #000000;
        }

        .publish-btn:disabled {
            color: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        @media (prefers-color-scheme: dark) {
            html, body, :fullscreen, ::backdrop {
                background-color: #191919;
                color: #ebebeb;
            }

            .title-input {
                color: #ebebeb;
            }

            .title-input::placeholder {
                color: #373737;
            }

            .editor {
                color: #e3e3e3;
            }

            .editor:empty:before {
                color: #555555;
            }

            .counter {
                color: #555555;
            }

            .publish-btn {
                color: #a0a0a0;
            }

            .publish-btn:hover {
                color: #ebebeb;
            }

            .status-message {
                color: #777777;
            }
        }
    </style>
</head>
<body>

    <main>
        <input type="text" id="post-title" class="title-input" placeholder="Заголовок" autofocus>
        <div id="post-body" class="editor" contenteditable="true" data-placeholder="Почніть писати свою історію тут..."></div>
    </main>

    <div id="counter" class="counter">0 слів</div>

    <div class="bottom-controls" id="controls-area">
        <span id="status" class="status-message">Надсилання...</span>
        <button id="publish-btn" class="publish-btn" onclick="publishPost()" aria-label="Опублікувати">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </div>

    <script>
        const titleInput = document.getElementById('post-title');
        const bodyDiv = document.getElementById('post-body');
        const publishBtn = document.getElementById('publish-btn');
        const statusText = document.getElementById('status');
        const counterText = document.getElementById('counter');

        // === LOCALSTORAGE ===
        document.addEventListener('DOMContentLoaded', () => {
            const savedTitle = localStorage.getItem('draft_title');
            const savedBody = localStorage.getItem('draft_body');

            if (savedTitle) titleInput.value = savedTitle;
            if (savedBody) bodyDiv.innerHTML = savedBody;

            updateCounter();
        });

        titleInput.addEventListener('input', () => {
            localStorage.setItem('draft_title', titleInput.value);
        });

        bodyDiv.addEventListener('input', () => {
            localStorage.setItem('draft_body', bodyDiv.innerHTML);
            updateCounter();
        });

        function clearDraft() {
            localStorage.removeItem('draft_title');
            localStorage.removeItem('draft_body');
            titleInput.value = '';
            bodyDiv.innerHTML = '';
            updateCounter();
        }

        // === ЛІЧИЛЬНИК ===
        function updateCounter() {
            const text = bodyDiv.innerText.trim();
            const words = text ? text.split(/\s+/).length : 0;
            const readingTime = Math.max(1, Math.ceil(words / 180));

            if (words === 0) {
                counterText.innerText = '0 слів';
                return;
            }

            let wordString = 'слів';
            const lastDigit = words % 10;
            const lastTwoDigits = words % 100;

            if (lastDigit === 1 && lastTwoDigits !== 11) {
                wordString = 'слово';
            } else if (lastDigit >= 2 && lastDigit <= 4 && (lastTwoDigits < 10 || lastTwoDigits >= 20)) {
                wordString = 'слова';
            }

            counterText.innerText = `${words} ${wordString} · ~${readingTime} хв читання`;
        }

        // === ГАРЯЧІ КЛАВІШІ ===
        bodyDiv.addEventListener('keydown', (e) => {
            const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
            const modifier = isMac ? e.metaKey : e.ctrlKey;

            if (modifier && e.key.toLowerCase() === 'b') {
                e.preventDefault();
                document.execCommand('bold', false, null);
            }
            if (modifier && e.key.toLowerCase() === 'i') {
                e.preventDefault();
                document.execCommand('italic', false, null);
            }
        });

        // === КОНВЕРТАЦІЯ ТА РОЗБИТТЯ НА ЧАСТИНИ ===
        function convertToTelegramChunks(title, bodyHTML) {
            const temp = document.createElement('div');
            temp.innerHTML = bodyHTML;

            const escapeHTML = (str) => str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Серіалізація окремої гілки DOM у Telegram HTML
            function serialize(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return node.nodeValue.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                }
                if (node.nodeType !== Node.ELEMENT_NODE) {
                    return '';
                }

                const tagName = node.tagName.toLowerCase();
                const childrenHtml = Array.from(node.childNodes).map(serialize).join('');

                if (tagName === 'b' || tagName === 'strong') {
                    return `<b>${childrenHtml}</b>`;
                }
                if (tagName === 'i' || tagName === 'em') {
                    return `<i>${childrenHtml}</i>`;
                }
                if (tagName === 'br') {
                    return '\n';
                }
                if (tagName === 'div' || tagName === 'p') {
                    return `\n${childrenHtml}`;
                }
                return childrenHtml;
            }

            // Розбиваємо документ на окремі абзаци (верхньорівневі блоки)
            const paragraphs = Array.from(temp.childNodes)
                .map(node => serialize(node).trim())
                .filter(p => p.length > 0);

            const chunks = [];
            let currentChunk = '';
            
            // Максимальний безпечний ліміт символів на одне повідомлення (з урахуванням HTML тегів)
            const MAX_LIMIT = 4000; 

            // Якщо є заголовок, ініціалізуємо ним першу частину
            if (title.trim()) {
                currentChunk += `<b>${escapeHTML(title.trim())}</b>\n\n`;
            }

            for (let para of paragraphs) {
                // Якщо раптом один абзац занадто великий (> 4000 символів), примусово ділимо його
                if (para.length > MAX_LIMIT) {
                    if (currentChunk.trim()) {
                        chunks.push(currentChunk.trim());
                        currentChunk = '';
                    }
                    let remaining = para;
                    while (remaining.length > 0) {
                        const subChunk = remaining.substring(0, MAX_LIMIT);
                        chunks.push(subChunk.trim());
                        remaining = remaining.substring(MAX_LIMIT);
                    }
                } else {
                    const separator = currentChunk ? '\n\n' : '';
                    // Якщо додавання поточного абзацу перевищить ліміт — фіксуємо поточну частину та створюємо нову
                    if (currentChunk.length + separator.length + para.length > MAX_LIMIT) {
                        if (currentChunk.trim()) {
                            chunks.push(currentChunk.trim());
                        }
                        currentChunk = para;
                    } else {
                        currentChunk += separator + para;
                    }
                }
            }

            if (currentChunk.trim()) {
                chunks.push(currentChunk.trim());
            }

            return chunks;
        }

        // === ПУБЛІКАЦІЯ ===
        async function publishPost() {
            const title = titleInput.value.trim();
            const bodyHTML = bodyDiv.innerHTML;

            if (!title && !bodyDiv.innerText.trim()) return;

            publishBtn.disabled = true;
            statusText.innerText = 'Надсилання...';
            statusText.classList.add('show');

            // Отримуємо масив частин тексту для відправки
            const chunks = convertToTelegramChunks(title, bodyHTML);

            try {
                const response = await fetch('/api/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chunks })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    statusText.innerText = 'Опубліковано';
                    clearDraft();
                    
                    setTimeout(() => {
                        statusText.classList.remove('show');
                    }, 3000);
                } else {
                    throw new Error(data.error || 'Помилка надсилання');
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = 'Помилка';
                alert('Не вдалося опублікувати: ' + error.message);
                setTimeout(() => {
                    statusText.classList.remove('show');
                }, 4000);
            } finally {
                publishBtn.disabled = false;
            }
        }

        // Повноекранний режим
        document.addEventListener('dblclick', function(event) {
            const controls = document.getElementById('controls-area');
            const isClickInsideInput = titleInput.contains(event.target) || event.target === titleInput;
            const isClickInsideBody = bodyDiv.contains(event.target) || event.target === bodyDiv;
            const isClickInsideControls = controls.contains(event.target) || event.target === controls;

            if (!isClickInsideInput && !isClickInsideBody && !isClickInsideControls) {
                toggleFullscreen();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn(`Повноекранний режим недоступний: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
