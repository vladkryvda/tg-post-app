<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новий допис</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #222222;
            line-height: 1.58;
            padding: 20px 20px 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        main {
            width: 100%;
            max-width: 720px;
            margin-top: 10px; 
        }

        .title-input {
            width: 100%;
            font-size: 42px;
            font-weight: 700;
            border: none;
            outline: none;
            margin-bottom: 20px;
            color: #222222;
            background: transparent;
        }

        .title-input::placeholder {
            color: #e8e8e8;
        }

        .editor {
            width: 100%;
            min-height: 350px;
            font-size: 18px;
            border: none;
            outline: none;
            color: #333333;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-bottom: 150px;
            background: transparent;
        }

        .editor:empty:before {
            content: attr(data-placeholder);
            color: #a0a0a0;
            cursor: text;
        }

        .bottom-controls {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }

        .status-message {
            font-size: 13px;
            color: #888888;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            user-select: none;
        }

        .status-message.show {
            opacity: 1;
        }

        .publish-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: #222222;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .publish-btn:hover {
            transform: translateX(4px);
            color: #000000;
        }

        .publish-btn:disabled {
            color: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <main>
        <input type="text" id="post-title" class="title-input" placeholder="Заголовок" autofocus>
        <div id="post-body" class="editor" contenteditable="true" data-placeholder="Почніть писати свою історію тут..."></div>
    </main>

    <div class="bottom-controls" id="controls-area">
        <span id="status" class="status-message">Надсилання...</span>
        <button id="publish-btn" class="publish-btn" onclick="publishPost()" aria-label="Опублікувати">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </div>

    <script>
        const titleInput = document.getElementById('post-title');
        const bodyDiv = document.getElementById('post-body');
        const publishBtn = document.getElementById('publish-btn');
        const statusText = document.getElementById('status');

        // === ПРАЦЯ З LOCALSTORAGE (Збереження чернетки) ===
        
        // Відновлення тексту при завантаженні сторінки
        document.addEventListener('DOMContentLoaded', () => {
            const savedTitle = localStorage.getItem('draft_title');
            const savedBody = localStorage.getItem('draft_body');

            if (savedTitle) {
                titleInput.value = savedTitle;
            }
            if (savedBody) {
                bodyDiv.innerHTML = savedBody;
            }
        });

        // Відстеження введення тексту та автоматичне збереження
        titleInput.addEventListener('input', () => {
            localStorage.setItem('draft_title', titleInput.value);
        });

        bodyDiv.addEventListener('input', () => {
            localStorage.setItem('draft_body', bodyDiv.innerHTML);
        });

        // Очищення збереженої чернетки після успішної відправки
        function clearDraft() {
            localStorage.removeItem('draft_title');
            localStorage.removeItem('draft_body');
            titleInput.value = '';
            bodyDiv.innerHTML = '';
        }

        // ==================================================

        async function publishPost() {
            const title = titleInput.value.trim();
            const body = bodyDiv.innerText.trim();

            if (!title && !body) {
                return;
            }

            publishBtn.disabled = true;
            statusText.innerText = 'Надсилання...';
            statusText.classList.add('show');

            try {
                const response = await fetch('/api/publish', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        text: body
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    statusText.innerText = 'Опубліковано';
                    
                    // Успішно відправлено - очищуємо чернетку
                    clearDraft();
                    
                    setTimeout(() => {
                        statusText.classList.remove('show');
                    }, 3000);
                } else {
                    throw new Error(data.error || 'Помилка надсилання');
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = 'Помилка';
                alert('Не вдалося опублікувати: ' + error.message);
                setTimeout(() => {
                    statusText.classList.remove('show');
                }, 4000);
            } finally {
                publishBtn.disabled = false;
            }
        }

        // Повноекранний режим на подвійний клік
        document.addEventListener('dblclick', function(event) {
            const controls = document.getElementById('controls-area');

            const isClickInsideInput = titleInput.contains(event.target) || event.target === titleInput;
            const isClickInsideBody = bodyDiv.contains(event.target) || event.target === bodyDiv;
            const isClickInsideControls = controls.contains(event.target) || event.target === controls;

            if (!isClickInsideInput && !isClickInsideBody && !isClickInsideControls) {
                toggleFullscreen();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn(`Не вдалося увімкнути повноекранний режим: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
